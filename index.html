<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hnguyguys' portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">hnguyguys<span>.</span></div>
    <div class="nav-links">
        <a href="#">Universe</a>
        <a href="#">Signals</a>
        <a href="#">Comm-Link</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>EXPLORING THE</h1>
    <h2>DIGITAL UNIVERSE</h2>
    <p>I build cool stuff, design systems, and create clean experiences.</p>
</div>

<!-- GALLERY -->
<div class="gallery">
    <img src="https://i.pinimg.com/736x/7b/f5/41/7bf54150f1d216e9f64de42e3150a76a.jpg">
    <img src="https://i.pinimg.com/736x/1c/f8/70/1cf870c7-9b40-48ff-ab7f-68588dce4353.png">
    <img src="https://i.pinimg.com/736x/ea/5b/25/ea5b25f6-614c-4cfe-8b97-1a0f3a402d60.png">
</div>

<!-- MUSIC PLAYER -->
<div class="player">
    <div id="songName">Now Playing</div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="toggleMusic()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>
</div>

<!-- CURSOR GLOW -->
<div class="cursor-glow" id="cursor"></div>

<audio id="bgMusic"></audio>

<script src="script.js"></script>
</body>
</html>
