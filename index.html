<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hnguyguys' portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIMPLE LOADER -->
<div id="loader">Loading...</div>

<!-- HERO -->
<div class="hero">
    <h1>WELCOME TO</h1>
    <h2 class="glow">hnguyguys' Portfolio</h2>
    <p>Clean systems. Creative design. Digital energy.</p>
</div>

<!-- PLAYER -->
<div class="player">

    <img src="c0bba8165dbb9982fa17e300d66f8264.jpg" class="banner">

    <div class="song-info" id="songName">Loading...</div>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <div class="controls">
        <button id="prevBtn">⏮</button>
        <button id="playBtn">▶</button>
        <button id="nextBtn">⏭</button>
        <button id="shuffleBtn">🔀</button>
    </div>

    <input type="range" id="volume" min="0" max="1" step="0.01">

</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
