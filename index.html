<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hnguyguys' portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-ring"></div>
    <h2>INITIALIZING SYSTEM</h2>
</div>

<!-- PARALLAX BG -->
<div class="parallax">
    <div class="stars"></div>
    <div class="grid"></div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>WELCOME TO</h1>
    <h2 class="glow">hnguyguys' Portfolio</h2>
    <p>Clean systems. Creative design. Digital energy.</p>
</div>

<!-- PLAYER -->
<div class="player">

    <div class="banner">
        <img src="c0bba8165dbb9982fa17e300d66f8264.jpg">
    </div>

    <div class="song">
        <span id="songName">Loading...</span>
    </div>

    <canvas id="wave"></canvas>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="toggleMusic()">▶</button>
        <button onclick="nextSong()">⏭</button>
        <button onclick="shuffleToggle()">🔀</button>
    </div>

</div>

<audio id="audio"></audio>

<div id="cursor"></div>

<script src="script.js"></script>
</body>
</html>
