<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hnguyguys' portfolio</title>

<!-- 🔥 CLEAN FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">hnguyguys<span>.</span></div>
</div>

<div class="hero">
    <h1>WELCOME TO</h1>
    <h2>hnguyguys' Portfolio</h2>
    <p>Discord Developer • Systems • UI</p>

    <button class="main-btn" onclick="goToServer()">View My Work</button>
</div>

<div class="player">
    <img id="cover" class="cover">
    <div id="songName">Now Playing</div>

    <div class="progress-container">
        <div id="progress"></div>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="toggleMusic()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="volume" min="0" max="1" step="0.01">
</div>

<audio id="bgMusic"></audio>

<script src="script.js"></script>

<script>
function goToServer() {
    window.location.href = "server.html";
}
</script>

</body>
</html>
