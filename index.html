<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hnguyguys' portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>

<!-- HERO -->
<div class="hero">
    <h1>WELCOME TO</h1>
    <h2 class="glow">hnguyguys' Portfolio</h2>
    <p>Clean systems. Creative design. Digital energy.</p>
</div>

<!-- PLAYER -->
<div class="player">

    <!-- NEW IMAGE (YOUR ONE) -->
    <img src="YOUR_IMAGE_HERE.jpg" class="cover">

    <div id="songName">White Keys</div>

    <div class="progress-container">
        <div id="progress"></div>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="toggleMusic()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="volume" min="0" max="1" step="0.01">
</div>

<div class="cursor-glow" id="cursor"></div>

<audio id="bgMusic"></audio>

<script src="script.js"></script>
</body>
</html>
