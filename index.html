<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hnguyguys' portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">hnguyguys<span>.</span></div>
    <div class="nav-links">
        <a href="#">Universe</a>
        <a href="#">Signals</a>
        <a href="#">Comm-Link</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1 class="small-title">WELCOME TO</h1>

    <h2 class="main-title">
        hnguyguys<span>' Portfolio</span>
    </h2>

    <p class="subtitle">
        Exploring creative systems, clean design, and digital experiences.
    </p>
</div>

<!-- MUSIC PLAYER -->
<div class="player">
    <div id="songName">Now Playing</div>

    <!-- progress -->
    <div class="progress-container">
        <div id="progress"></div>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="toggleMusic()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>
</div>

<div class="cursor-glow" id="cursor"></div>

<audio id="bgMusic"></audio>

<script src="script.js"></script>
</body>
</html>
