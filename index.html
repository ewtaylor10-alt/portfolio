<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hnguyguys' portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-circle"></div>
    <p>LOADING SYSTEM...</p>
</div>

<!-- ACCENTS -->
<div class="line l1"></div>
<div class="line l2"></div>
<div class="bubble b1"></div>
<div class="bubble b2"></div>

<!-- HERO -->
<div class="hero">
    <h1>WELCOME TO</h1>
    <h2 class="glow">hnguyguys' Portfolio</h2>
    <p>Clean systems. Creative design. Digital energy.</p>
</div>

<!-- PLAYER -->
<div class="player">

    <div class="now-playing">
        <img src="c0bba8165dbb9982fa17e300d66f8264.jpg" class="cover">

        <div class="song-info">
            <div id="songName">Loading...</div>
            <div class="artist">Now Playing</div>
        </div>
    </div>

    <canvas id="waveform"></canvas>

    <div class="time">
        <span id="current">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <div class="progress-container">
        <div id="progress"></div>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="toggleMusic()">▶</button>
        <button onclick="nextSong()">⏭</button>
        <button onclick="shuffleToggle()">🔀</button>
    </div>

    <input type="range" id="volume" min="0" max="1" step="0.01">
</div>

<audio id="bgMusic"></audio>

<script src="script.js"></script>
</body>
</html>
